<!DOCTYPE html>
<html>
<head>
    <title>ADAMS Route Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([37.5665, 126.9780], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);


// ----------------------
// LIVE ROUTE FROM FLASK
// ----------------------
fetch("http://127.0.0.1:5000/route")
    .then(res => res.json())
    .then(data => {

        console.log("Route data:", data);

        var route = data.coordinates;

        var polyline = L.polyline(route, {
            color: 'blue',
            weight: 5
        }).addTo(map);

        map.fitBounds(polyline.getBounds());

        L.marker(route[0]).addTo(map).bindPopup("Start");
        L.marker(route[route.length - 1]).addTo(map).bindPopup("End");

    })
    .catch(err => {
        console.error("Route load failed:", err);
    });

</script>

</body>
</html>
